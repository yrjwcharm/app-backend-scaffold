server:
  port: 8080

spring:
  application:
    name: app-backend-scaffold
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/app_backend?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 3000ms

  cache:
    type: redis
    redis:
      time-to-live: 1800000

  http:
    converters:
      preferred-json-mapper: jackson2

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    # 开发环境可开启，生产环境建议关闭
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

app:
  jwt:
    # 至少 32 字节，正式环境请放到环境变量或配置中心
    secret: ${JWT_SECRET:app-backend-scaffold-jwt-secret-please-change-32bytes}
    access-token-expire-days: 30
    refresh-token-expire-days: 30
    header: Authorization
    prefix: Bearer 
  sms-code:
    # 验证码仅存储摘要，以下密钥正式环境必须放到环境变量或配置中心。
    hash-secret: ${SMS_CODE_HASH_SECRET:please-change-sms-code-hash-secret}
    expire-minutes: 5
    send-interval-seconds: 60
    max-verify-attempts: 5
    max-sends-per-day: 10
    max-sends-per-ip-hour: 30
    length: 6
    # 联调阶段可打印验证码，正式环境务必设为 false。
    log-code-enabled: ${SMS_CODE_LOG_ENABLED:false}

# 阿里云云产品配置
aliyun:
  sms:
    endpoint: ${ALIYUN_SMS_ENDPOINT:dysmsapi.aliyuncs.com}
    region-id: ${ALIYUN_SMS_REGION_ID:cn-hangzhou}
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID:${ALIYUN_ACCESS_KEY_ID:}}
    access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET:${ALIYUN_ACCESS_KEY_SECRET:}}
    sign-name: ${ALIYUN_SMS_SIGN_NAME:}
    template-code: ${ALIYUN_SMS_TEMPLATE_CODE:}
    template-param-name: ${ALIYUN_SMS_TEMPLATE_PARAM_NAME:code}
    out-id-prefix: ${ALIYUN_SMS_OUT_ID_PREFIX:login-code}
    auto-retry-enabled: ${ALIYUN_SMS_AUTO_RETRY_ENABLED:true}
    max-attempts: ${ALIYUN_SMS_MAX_ATTEMPTS:2}
    connect-timeout-millis: ${ALIYUN_SMS_CONNECT_TIMEOUT_MILLIS:3000}
    read-timeout-millis: ${ALIYUN_SMS_READ_TIMEOUT_MILLIS:5000}
  oss:
    endpoint: https://oss-cn-beijing.aliyuncs.com
    bucket-name: your-bucket-name
    access-key-id: ${ALIYUN_ACCESS_KEY_ID}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET}
    domain: https://your-bucket-name.oss-cn-beijing.aliyuncs.com
    dir: app/uploads
    allowed-types:
      - image/jpeg
      - image/png
      - image/webp
      - application/pdf
    max-size: 10485760

#本地磁盘存储
file:
  #upload-dir: /data/app/uploads
  upload-dir: ./uploads
  access-prefix: /uploads
  max-size: 10485760
  allowed-types:
    - image/jpeg
    - image/png
    - image/webp
    - application/pdf
